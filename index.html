<title>49 Balls Head Road, Waverton — 3D Model</title>
<style>
body{margin:0;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
canvas{display:block}
#info{position:absolute;top:10px;left:10px;color:#fff;background:rgba(0,0,0,.7);padding:10px 14px;border-radius:6px;font-size:13px;max-width:260px}
#info h3{margin:0 0 4px;font-size:14px}
#views{position:absolute;top:10px;right:10px;display:flex;flex-direction:column;gap:4px}
#views button{background:rgba(0,0,0,.7);color:#fff;border:1px solid #555;padding:6px 12px;border-radius:4px;cursor:pointer;font-size:12px}
#views button:hover{background:rgba(60,60,60,.9)}
#legend{position:absolute;bottom:10px;left:10px;background:rgba(0,0,0,.85);color:#fff;padding:12px 16px;border-radius:6px;font-size:12px;max-height:60vh;overflow-y:auto}
#legend h4{margin:0 0 8px;font-size:13px;cursor:pointer;user-select:none}
#legend h4::after{content:' ▼';font-size:10px}
#legend.collapsed h4::after{content:' ▶'}
#legend.collapsed .lrow,#legend.collapsed .lwarn{display:none}
.lrow{display:flex;align-items:center;margin-bottom:4px}
.lswatch{width:16px;height:16px;border-radius:3px;margin-right:8px;border:1px solid #666;flex-shrink:0}
.lwarn{color:#f0c040;margin-top:8px;font-size:11px;line-height:1.4}
</style>
</head>

<div id="info">
  <h3>49 Balls Head Rd, Waverton</h3>
  Lot 29 Sect 7 DP 6894 — Horizon Homes J1672 Rev S<br>
  Drag to orbit · Scroll to zoom · Right-drag to pan
</div>
<div id="views"></div>
<div id="legend"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>

function(){return function(dX,dY){var el=s.domElement;if(s.object.isPerspectiveCamera){var ov=new THREE.Vector3;ov.copy(s.object.position).sub(s.target);var tD=ov.length()*Math.tan(s.object.fov/2*Math.PI/180);panL(2*dX*tD/el.clientHeight,s.object.matrix);panU(2*dY*tD/el.clientHeight,s.object.matrix)}}}();function dIn(ds){scl/=ds}function dOut(ds){scl*=ds}function onMD(e){if(!s.enabled)return;e.preventDefault();if(e.button===0){state=S.ROTATE;rS.set(e.clientX,e.clientY)}else if(e.button===1){state=S.DOLLY;dS.set(e.clientX,e.clientY)}else if(e.button===2){state=S.PAN;pS.set(e.clientX,e.clientY)}if(state!==S.NONE){document.addEventListener('mousemove',onMM,false);document.addEventListener('mouseup',onMU,false)}}function onMM(e){if(!s.enabled)return;e.preventDefault();if(state===S.ROTATE){rE.set(e.clientX,e.clientY);rD.subVectors(rE,rS);rL(2*Math.PI*rD.x/d.clientHeight*s.rotateSpeed);rU(2*Math.PI*rD.y/d.clientHeight*s.rotateSpeed);rS.copy(rE)}else if(state===S.DOLLY){dE.set(e.clientX,e.clientY);dD.subVectors(dE,dS);if(dD.y>0)dIn(Math.pow(0.95,s.zoomSpeed));else if(dD.y<0)dOut(Math.pow(0.95,s.zoomSpeed));dS.copy(dE)}else if(state===S.PAN){pE.set(e.clientX,e.clientY);pD.subVectors(pE,pS);pan(pD.x,pD.y);pS.copy(pE)}s.update()}function onMU(){document.removeEventListener('mousemove',onMM,false);document.removeEventListener('mouseup',onMU,false);state=S.NONE}function onW(e){if(!s.enabled||!s.enableZoom)return;e.preventDefault();e.stopPropagation();if(e.deltaY<0)dOut(Math.pow(0.95,s.zoomSpeed));else if(e.deltaY>0)dIn(Math.pow(0.95,s.zoomSpeed));s.update()}function onTS(e){if(!s.enabled)return;switch(e.touches.length){case 1:state=S.ROTATE;rS.set(e.touches[0].pageX,e.touches[0].pageY);break;case 2:state=S.DOLLY;var dx=e.touches[0].pageX-e.touches[1].pageX,dy=e.touches[0].pageY-e.touches[1].pageY;dS.set(0,Math.sqrt(dx*dx+dy*dy));break}}function onTM(e){if(!s.enabled)return;e.preventDefault();e.stopPropagation();switch(e.touches.length){case 1:rE.set(e.touches[0].pageX,e.touches[0].pageY);rD.subVectors(rE,rS);rL(2*Math.PI*rD.x/d.clientHeight*s.rotateSpeed);rU(2*Math.PI*rD.y/d.clientHeight*s.rotateSpeed);rS.copy(rE);break;case 2:var dx=e.touches[0].pageX-e.touches[1].pageX,dy=e.touches[0].pageY-e.touches[1].pageY;dE.set(0,Math.sqrt(dx*dx+dy*dy));dD.subVectors(dE,dS);if(dD.y>0)dOut(Math.pow(0.95,s.zoomSpeed));else if(dD.y<0)dIn(Math.pow(0.95,s.zoomSpeed));dS.copy(dE);break}s.update()}d.addEventListener('mousedown',onMD,false);d.addEventListener('wheel',onW,{passive:false});d.addEventListener('touchstart',onTS,{passive:false});d.addEventListener('touchmove',onTM,{passive:false});d.addEventListener('touchend',function(){state=S.NONE},false);d.addEventListener('contextmenu',function(e){e.preventDefault()},false);this.update()};

</script>
<script>
// ══════════════════════════════════════════
// 49 Balls Head Road — 3D House Model
// ══════════════════════════════════════════
// Coordinate system: X+=East, X-=West, Z+=North(street/high), Z-=South(harbour/low), Y+=Up
// Datum: Y=0 = RL 28.890 (Lower Floor level)
// All dimensions in metres

// ── Colours ──
var C = {
  render:   0xcec8c1, // Dulux Grey Pebble 1/2 Str
  monument: 0x3d4040, // Colorbond Monument
  surfmist: 0xe8e1d4, // Colorbond Surfmist
  timber:   0x8b6f47, // Pacific Maple
  glass:    0x8ec8d8,
  concrete: 0xb0a898,
  ground:   0x6b8e5a
};

// ── Materials ──
var M = {
  render:   new THREE.MeshStandardMaterial({color:C.render, roughness:0.85}),
  monument: new THREE.MeshStandardMaterial({color:C.monument, roughness:0.5}),
  surfmist: new THREE.MeshStandardMaterial({color:C.surfmist, roughness:0.4, metalness:0.1}),
  timber:   new THREE.MeshStandardMaterial({color:C.timber, roughness:0.7}),
  glass:    new THREE.MeshStandardMaterial({color:C.glass, roughness:0.1, metalness:0.1, transparent:true, opacity:0.35, side: THREE.DoubleSide}),
  concrete: new THREE.MeshStandardMaterial({color:C.concrete, roughness:0.9}),
  ground:   new THREE.MeshStandardMaterial({color:C.ground, roughness:1}),
  pv:       new THREE.MeshStandardMaterial({color:0x1a1a2e, roughness:0.3, metalness:0.6})
};

// ── Scene ──
var scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
scene.fog = new THREE.Fog(0x87ceeb, 80, 150);

var camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 200);
camera.position.set(20, 15, -24);

var renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

var controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 4, 0);
controls.minDistance = 5;
controls.maxDistance = 80;

// ── Lighting ──
scene.add(new THREE.AmbientLight(0xffffff, 0.5));
var sun = new THREE.DirectionalLight(0xffffff, 1.0);
sun.position.set(15, 25, -10);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -25; sun.shadow.camera.right = 25;
sun.shadow.camera.top = 25; sun.shadow.camera.bottom = -25;
scene.add(sun);
scene.add(new THREE.HemisphereLight(0xddeeff, 0x8b7d6b, 0.3));

// ── Helpers ──
var house = new THREE.Group();
scene.add(house);

function bx(w,h,d,mat) {
  var m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), mat);
  m.castShadow = true; m.receiveShadow = true;
  return m;
}

// ══════════════════════════════════════════
// GROUND TERRAIN — slopes from north(high ≈Y=3.5) to south(low ≈Y=0)
// ══════════════════════════════════════════
var gndGeo = new THREE.PlaneGeometry(80, 80, 30, 30);
var gndPos = gndGeo.attributes.position;
for (var i = 0; i < gndPos.count; i++) {
  var lx = gndPos.getX(i);
  var ly = gndPos.getY(i); // local Y → world -Z after rotation
  // ly positive = south in world (after rot -PI/2, localY → -worldZ)
  // We want north(Z+) high, south(Z-) low
  // north in local = ly negative, south = ly positive
  var elevation = -ly * 0.08 + 1.7 + Math.sin(lx*0.08)*0.15;
  gndPos.setZ(i, elevation);
}
gndGeo.computeVertexNormals();
var gndMesh = new THREE.Mesh(gndGeo, M.ground);
gndMesh.rotation.x = -Math.PI / 2;
gndMesh.receiveShadow = true;
scene.add(gndMesh);

// ══════════════════════════════════════════
// BUILDING DIMENSIONS
// ══════════════════════════════════════════
var WALL = 0.27; // 270mm cavity brick

// Lower Floor: 12.01m wide × 18.71m deep × 3.0m high
// Base Y = 0 (RL 28.890)
var LF_W=12.01, LF_D=18.71, LF_H=3.0, LF_Y=0;
var LF_E=LF_W/2, LF_Wst=-LF_W/2; // ±6.005
var LF_N=LF_D/2, LF_S=-LF_D/2;    // ±9.355

// Ground Floor: 12.01m wide × 21.02m deep × 2.75m high
// Base Y = 3.45 (RL 32.340)
// South edge aligns with lower floor south. Extends further north (garage area)
var GF_W=12.01, GF_D=21.02, GF_H=2.75, GF_Y=3.45;
var GF_S=LF_S; // -9.355 (same south edge)
var GF_N=GF_S+GF_D; // +11.665

// First Floor: 8.26m wide × 11.37m deep × 2.6m high
// Base Y = 6.65 (RL 35.540)
// North edge aligns roughly with lower floor north edge
var FF_W=8.26, FF_D=11.37, FF_H=2.6, FF_Y=6.65;
var FF_N=LF_N; // +9.355
var FF_S=FF_N-FF_D; // -2.015

// ══════════════════════════════════════════
// LOWER FLOOR WALLS (Y=0 to Y=3.0)
// ══════════════════════════════════════════
// North wall (mostly buried in hillside)
var w;
w = bx(LF_W, LF_H, WALL, M.render);
w.position.set(0, LF_Y+LF_H/2, LF_N); house.add(w);
// South wall (fully exposed to harbour)
w = bx(LF_W, LF_H, WALL, M.render);
w.position.set(0, LF_Y+LF_H/2, LF_S); house.add(w);
// East wall
w = bx(WALL, LF_H, LF_D, M.render);
w.position.set(LF_E, LF_Y+LF_H/2, 0); house.add(w);
// West wall — MONUMENT (Scyon Axon cladding)
w = bx(WALL, LF_H, LF_D, M.monument);
w.position.set(LF_Wst, LF_Y+LF_H/2, 0); house.add(w);
// Floor slab
w = bx(LF_W, 0.2, LF_D, M.concrete);
w.position.set(0, LF_Y-0.1, 0); house.add(w);

// ══════════════════════════════════════════
// GROUND FLOOR WALLS (Y=3.45 to Y=6.2)
// ══════════════════════════════════════════
var GF_CZ = (GF_N+GF_S)/2; // centre Z = 1.155
// North wall
w = bx(GF_W, GF_H, WALL, M.render);
w.position.set(0, GF_Y+GF_H/2, GF_N); house.add(w);
// South wall (same Z as lower floor south)
w = bx(GF_W, GF_H, WALL, M.render);
w.position.set(0, GF_Y+GF_H/2, GF_S); house.add(w);
// East wall
w = bx(WALL, GF_H, GF_D, M.render);
w.position.set(LF_E, GF_Y+GF_H/2, GF_CZ); house.add(w);
// West wall — MONUMENT
w = bx(WALL, GF_H, GF_D, M.monument);
w.position.set(LF_Wst, GF_Y+GF_H/2, GF_CZ); house.add(w);
// Floor slab
w = bx(GF_W, 0.2, GF_D, M.concrete);
w.position.set(0, GF_Y-0.1, GF_CZ); house.add(w);

// ══════════════════════════════════════════
// FIRST FLOOR WALLS (Y=6.65 to Y=9.25)
// ══════════════════════════════════════════
var FF_CZ = (FF_N+FF_S)/2; // centre Z = 3.67
var FF_E=FF_W/2, FF_Wst=-FF_W/2; // ±4.13
// North wall
w = bx(FF_W, FF_H, WALL, M.render);
w.position.set(0, FF_Y+FF_H/2, FF_N); house.add(w);
// South wall
w = bx(FF_W, FF_H, WALL, M.render);
w.position.set(0, FF_Y+FF_H/2, FF_S); house.add(w);
// East wall
w = bx(WALL, FF_H, FF_D, M.render);
w.position.set(FF_E, FF_Y+FF_H/2, FF_CZ); house.add(w);
// West wall — MONUMENT
w = bx(WALL, FF_H, FF_D, M.monument);
w.position.set(FF_Wst, FF_Y+FF_H/2, FF_CZ); house.add(w);
// Floor slab
w = bx(FF_W, 0.2, FF_D, M.concrete);
w.position.set(0, FF_Y-0.1, FF_CZ); house.add(w);

// ══════════════════════════════════════════
// ROOF
// ══════════════════════════════════════════
var ROVER = 0.5; // overhang

// Main roof over first floor — 5° pitch
var mainRoof = bx(FF_W+ROVER*2, 0.15, FF_D+ROVER*2, M.surfmist);
mainRoof.position.set(0, FF_Y+FF_H+0.075, FF_CZ);
mainRoof.rotation.x = 5 * Math.PI / 180; // slopes down toward south
mainRoof.castShadow = true; house.add(mainRoof);

// Flat roof over ground floor south section (between LF_S and FF_S)
var gfRoofSouthD = Math.abs(FF_S - GF_S);
var gfRoofS = bx(GF_W+0.4, 0.12, gfRoofSouthD+0.4, M.surfmist);
gfRoofS.position.set(0, GF_Y+GF_H+0.06, (FF_S+GF_S)/2);
gfRoofS.rotation.x = 2*Math.PI/180;
gfRoofS.castShadow = true; house.add(gfRoofS);

// Flat roof over ground floor north section (between FF_N and GF_N)
var gfRoofNorthD = GF_N - FF_N;
if (gfRoofNorthD > 0.5) {
  var gfRoofN = bx(GF_W+0.4, 0.12, gfRoofNorthD+0.4, M.surfmist);
  gfRoofN.position.set(0, GF_Y+GF_H+0.06, (FF_N+GF_N)/2);
  gfRoofN.castShadow = true; house.add(gfRoofN);
}

// Side flat roofs over GF areas not under FF (east and west strips)
var sideRoofW = (GF_W - FF_W)/2;
if (sideRoofW > 0.3) {
  // East side roof strip
  var srE = bx(sideRoofW+0.2, 0.12, FF_D+0.4, M.surfmist);
  srE.position.set(FF_E + sideRoofW/2, GF_Y+GF_H+0.06, FF_CZ);
  srE.castShadow = true; house.add(srE);
  // West side roof strip
  var srW = bx(sideRoofW+0.2, 0.12, FF_D+0.4, M.surfmist);
  srW.position.set(FF_Wst - sideRoofW/2, GF_Y+GF_H+0.06, FF_CZ);
  srW.castShadow = true; house.add(srW);
}

// ── Parapets ──
// West parapet (full length of ground floor)
var parH = 0.8;
w = bx(WALL, parH, GF_D+0.4, M.monument);
w.position.set(LF_Wst, GF_Y+GF_H+parH/2, GF_CZ); house.add(w);
// West parapet cap (Surfmist)
w = bx(0.35, 0.06, GF_D+0.4, M.surfmist);
w.position.set(LF_Wst, GF_Y+GF_H+parH+0.03, GF_CZ); house.add(w);
// North parapet on first floor
w = bx(FF_W, parH*0.6, WALL, M.render);
w.position.set(0, FF_Y+FF_H+parH*0.3, FF_N); house.add(w);
w = bx(FF_W, 0.06, 0.35, M.surfmist);
w.position.set(0, FF_Y+FF_H+parH*0.6+0.03, FF_N); house.add(w);

// ── Fascia (Monument) ──
function fascia(fw,fd,fx,fy,fz){var f=bx(fw,0.12,fd,M.monument);f.position.set(fx,fy,fz);house.add(f)}
var fY = GF_Y+GF_H;
fascia(0.08, GF_D+0.4, LF_E+0.2, fY, GF_CZ);
fascia(GF_W+0.4, 0.08, 0, fY, GF_S-0.2);
fascia(GF_W+0.4, 0.08, 0, fY, GF_N+0.2);
var ffY = FF_Y+FF_H;
fascia(0.08, FF_D+ROVER*2, FF_E+ROVER, ffY, FF_CZ);
fascia(0.08, FF_D+ROVER*2, FF_Wst-ROVER, ffY, FF_CZ);
fascia(FF_W+ROVER*2, 0.08, 0, ffY, FF_S-ROVER);

// ══════════════════════════════════════════
// GARAGE DOOR — D4 on WEST wall (per door schedule), GF level
// 5.0m wide × 2.38m tall
// ══════════════════════════════════════════
var garZ = GF_N - 4.0; // roughly in the north portion of west wall
var garDoor = bx(0.08, 2.38, 5.0, M.monument);
garDoor.position.set(LF_Wst+WALL/2, GF_Y+2.38/2, garZ); house.add(garDoor);
// Madrid profile horizontal lines
for (var gi=1;gi<5;gi++){
  var gl=bx(0.1,0.02,4.9,M.render);
  gl.position.set(LF_Wst+WALL/2+0.05, GF_Y+gi*2.38/5, garZ);house.add(gl);
}

// ══════════════════════════════════════════
// ENTRY DOOR — D5 on WEST wall, Hume Savoy SX45
// 1.2m wide × 2.34m tall, Pacific Maple timber
// ══════════════════════════════════════════
var entryZ = garZ - 4.5;
var entDoor = bx(0.06, 2.34, 1.2, M.timber);
entDoor.position.set(LF_Wst+WALL/2, GF_Y+2.34/2, entryZ); house.add(entDoor);
var entGlass = bx(0.02, 1.6, 0.4, M.glass);
entGlass.position.set(LF_Wst+WALL/2-0.02, GF_Y+0.5+1.6/2, entryZ); house.add(entGlass);

// Porch (west side near entry) with 3 timber posts
var porchSlab = bx(1.5, 0.15, 3.0, M.concrete);
porchSlab.position.set(LF_Wst-0.75, GF_Y-0.075, entryZ); house.add(porchSlab);
for (var pi=0;pi<3;pi++){
  var pz = entryZ - 1.2 + pi*1.2;
  var post = bx(0.065, GF_H, 0.18, M.monument);
  post.position.set(LF_Wst-1.4, GF_Y+GF_H/2, pz); house.add(post);
}
// Porch roof
var porchRoof = bx(1.8, 0.1, 3.4, M.surfmist);
porchRoof.position.set(LF_Wst-0.75, GF_Y+GF_H+0.05, entryZ); house.add(porchRoof);

// D2 — Stacking slider on NORTH wall (3.25m wide × 3.0m tall)
var d2w=3.25, d2h=Math.min(3.0,GF_H-0.15);
var d2f = bx(d2w, d2h, 0.06, M.monument);
d2f.position.set(2.0, GF_Y+0.1+d2h/2, GF_N); house.add(d2f);
var d2g = bx(d2w-0.1, d2h-0.1, 0.02, M.glass);
d2g.position.set(2.0, GF_Y+0.15+d2h/2-0.05, GF_N); house.add(d2g);

// D3 — Stacking slider on EAST wall (4.7m wide × 3.0m tall) lower floor
var d3h=Math.min(3.0,LF_H-0.15);
var d3f = bx(0.06, d3h, 4.7, M.monument);

// ══════════════════════════════════════════
// WINDOWS — all 27 from schedule
// Schedule format: HEIGHT(mm) × WIDTH(mm)
// In model: winW = horizontal, winH = vertical
// ══════════════════════════════════════════
function addWin(face, wallX, wallZ, baseY, cx, winW, winH, sillH) {
  // face: 'N','S' → window on XY plane; 'E','W' → window on ZY plane
  // cx: position along the wall face
  // wallX/wallZ: the wall's fixed coordinate
  sillH = sillH || 0.9;
  var wy = baseY + sillH + winH/2;
  var frame, glass;
  if (face==='N'||face==='S') {
    frame = bx(winW, winH, 0.05, M.monument);
    glass = bx(winW-0.06, winH-0.06, 0.02, M.glass);
    frame.position.set(cx, wy, wallZ);
    glass.position.set(cx, wy, wallZ);
  } else {
    frame = bx(0.05, winH, winW, M.monument);
    glass = bx(0.02, winH-0.06, winW-0.06, M.glass);
    frame.position.set(wallX, wy, cx);
    glass.position.set(wallX, wy, cx);
  }
  house.add(frame); house.add(glass);
  return {frame:frame, glass:glass};
}
